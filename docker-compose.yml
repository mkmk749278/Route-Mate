services:
  postgres:
    image: postgres:16-alpine
    container_name: route-mates-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-route_mates}
      POSTGRES_USER: ${DB_USER:-route_mates}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-route_mates}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: route-mates-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: route-mates-api
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      API_PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://route_mates:route_mates@postgres:5432/route_mates}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-replace_me}
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
