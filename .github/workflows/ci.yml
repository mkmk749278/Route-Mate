name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: routemate
          POSTGRES_PASSWORD: routemate
          POSTGRES_DB: routemate_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U routemate -d routemate_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://routemate:routemate@localhost:5432/routemate_test
      JWT_SECRET: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: pytest -q

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :app:assembleDebug -PAPI_BASE_URL=https://api.example.com --no-daemon --stacktrace
      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-reports
          path: |
            android/app/build/reports/
            android/build/reports/
          if-no-files-found: ignore
