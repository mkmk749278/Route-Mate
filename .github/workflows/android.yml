name: Android release

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:
    inputs:
      version_name:
        description: "versionName (e.g. 0.1.0)"
        required: false
        default: ""

concurrency:
  group: android-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret not set"
            exit 1
          fi
          # Strip any character that isn't part of standard base64 (handles
          # mobile-paste artifacts: zero-width chars, smart quotes, NBSP, etc.).
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -cd 'A-Za-z0-9+/=' > release.keystore.b64
          b64_bytes=$(stat -c %s release.keystore.b64)
          echo "::notice::sanitized base64 length=${b64_bytes}"
          base64 -d release.keystore.b64 > release.keystore
          # Sanity check: keystore should be > 1 KB.
          ks_bytes=$(stat -c %s release.keystore)
          if [ "$ks_bytes" -lt 1000 ]; then
            echo "::error::release.keystore is only ${ks_bytes} bytes (b64 was ${b64_bytes} chars) — secret is truncated or corrupt"
            exit 1
          fi
          cat > keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Compute version
        id: ver
        run: |
          VC=${{ github.run_number }}
          VN="${{ github.event.inputs.version_name }}"
          if [ -z "$VN" ]; then VN="0.1.${VC}"; fi
          echo "version_code=$VC" >> $GITHUB_OUTPUT
          echo "version_name=$VN" >> $GITHUB_OUTPUT

      - name: Build signed APK
        env:
          VERSION_CODE: ${{ steps.ver.outputs.version_code }}
          VERSION_NAME: ${{ steps.ver.outputs.version_name }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: ./gradlew :app:assembleRelease -PAPI_BASE_URL=$API_BASE_URL --no-daemon

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/RouteMates-${{ steps.ver.outputs.version_name }}.apk

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version_name }}
          name: Route Mates v${{ steps.ver.outputs.version_name }}
          generate_release_notes: true
          files: android/app/build/outputs/apk/release/RouteMates-${{ steps.ver.outputs.version_name }}.apk
